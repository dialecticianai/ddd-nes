# UNROM (Mapper 2) linker config — 4 x 16KB PRG banks + 8KB CHR-RAM
#
# Banks 0-2: switchable at $8000-$BFFF (each 16KB, but last 2 bytes reserved)
# Bank 3: fixed at $C000-$FFFF (contains vectors, reset, bankswitch)
#
# Memory regions are written to the output file in declaration order.
# All switchable banks share the same CPU address range ($8000-$BFFF).

MEMORY {
    ZP:      start=$0010, size=$00F0, type=rw, define=yes;

    HEADER:  start=$0000, size=$0010, fill=yes, fillval=$00, file=%O;

    # Bank 0 (switchable) — 16KB at $8000
    BANK0:   start=$8000, size=$4000, fill=yes, fillval=$FF, file=%O;

    # Bank 1 (switchable) — 16KB at $8000
    BANK1:   start=$8000, size=$4000, fill=yes, fillval=$FF, file=%O;

    # Bank 2 (switchable) — 16KB at $8000
    BANK2:   start=$8000, size=$4000, fill=yes, fillval=$FF, file=%O;

    # Bank 3 (fixed) — 16KB at $C000, last 6 bytes are vectors
    BANK3:   start=$C000, size=$3FFA, fill=yes, fillval=$FF, file=%O;
    ROMV:    start=$FFFA, size=$0006, fill=yes, file=%O;
}

SEGMENTS {
    ZEROPAGE: load=ZP,     type=zp;
    HEADER:   load=HEADER, type=ro;
    BANK0DAT: load=BANK0,  type=ro;
    BANK1DAT: load=BANK1,  type=ro;
    BANK2DAT: load=BANK2,  type=ro;
    CODE:     load=BANK3,  type=ro;
    RODATA:   load=BANK3,  type=ro;
    VECTORS:  load=ROMV,   type=ro;
}
